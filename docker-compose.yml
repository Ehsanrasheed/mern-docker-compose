services:
  mongodb:
    image: mongo
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb

  backend:
    image: 856554458655.dkr.ecr.eu-north-1.amazonaws.com/my-app@sha256:18f11a4ae650490b92bfb8a12fa735ab677efe4622faeb3ba0ef2be57c98d23d
    ports:
      - 3000:3000
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/mern?authSource=admin
      - PORT=3000
      -   JWT_SECRET=aaddsakhriewr484345eww@45353%UEHRW

    depends_on:
      - mongodb

volumes:
  mongo-data: